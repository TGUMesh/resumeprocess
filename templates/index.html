<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeCraft</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="left-panel">
            <header>
                <h1>ResumeCraft</h1>
                <p>Upload your resume to get personalized job recommendations!</p>
            </header>

            <form id="resumeForm" enctype="multipart/form-data">
                <div class="resumeUpload">
                    <label for="resume">Upload Your Resume (PDF only):</label>
                    <input type="file" id="resume" name="resume" accept="application/pdf" required>
                    <button type="submit" class="submit-btn">Upload Resume</button>
                </div>
            </form>

            <!-- Progress bar or message -->
            <div id="uploadProgress" style="display:none;">
                <p>Uploading and processing your resume...</p>
                <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
            </div>

            <!-- Initially hidden resume preview section -->
            <div class="resumePreview" id="resumePreview" style="display:none;">
                <h2>Uploaded Resume Preview</h2>
                <iframe id="resumeIframe" style="display:none;" width="100%" height="500px"></iframe>
                <p id="noResumeMessage">No resume uploaded yet.</p>
            </div>
        </div>

        <div class="right-panel" id="results" style="display: none;">
            <div class="skills-matching">
                <h2>Extracted Skills</h2>
                <ul id="skillsList"></ul>

                <h2>Job Recommendations</h2>
                <ul id="jobList"></ul>
            </div>
            <div class="optimization-tips">
                <h2>Resume Optimization Tips</h2>
                <ul id="optimizationTipsList">
                </ul>
            </div>

            <div class="career-roadmap mt-8">
                <h2>Interactive Career Roadmap (Knowledge Graph)</h2>
                <div id="career-graph"
                    style="width: 100%; height: 400px; border: 1px solid #ddd; background-color: #fafafa; border-radius: 8px;">
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script src="{{ url_for('static', filename='graph.js') }}"></script>
</body>

</html>
