<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognify Career Navigator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body
    class="bg-gray-50 text-gray-800 antialiased min-h-screen relative overflow-x-hidden font-inter selection:bg-purple-300 selection:text-purple-900">

    <!-- Decorative Modern Background -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div
            class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] max-w-[600px] max-h-[600px] bg-blue-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-40 animate-blob">
        </div>
        <div
            class="absolute top-[-10%] right-[-10%] w-[40vw] h-[40vw] max-w-[600px] max-h-[600px] bg-purple-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-40 animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute bottom-[-10%] left-[20%] w-[40vw] h-[40vw] max-w-[600px] max-h-[600px] bg-pink-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-40 animate-blob animation-delay-4000">
        </div>
    </div>

    <!-- Main Content Container -->
    <div class="relative z-10 w-full max-w-7xl mx-auto px-4 sm:px-6 py-12 flex flex-col lg:flex-row gap-8 items-start">

        <!-- Left Panel: Upload & Preview (Sticky on large screens) -->
        <div class="w-full lg:w-4/12 flex flex-col gap-6 sticky top-12">

            <!-- Hero / Upload Card -->
            <div
                class="bg-white/80 backdrop-blur-2xl rounded-3xl p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white">
                <header class="mb-8">
                    <h1
                        class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 mb-2 tracking-tight">
                        Cognify</h1>
                    <p class="text-gray-500 font-medium">AI Career Navigator System</p>
                </header>

                <form id="resumeForm" enctype="multipart/form-data" class="space-y-6">
                    <div class="relative group cursor-pointer">
                        <input type="file" id="resume" name="resume" accept="application/pdf" required
                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                        <div
                            class="w-full py-10 px-6 border-2 border-dashed border-blue-200 rounded-2xl bg-blue-50/50 text-center group-hover:bg-blue-50 transition-colors relative z-10 flex flex-col items-center gap-3">
                            <div
                                class="p-3 bg-white rounded-full shadow-sm text-blue-500 mb-1 group-hover:scale-110 transition-transform">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                                    </path>
                                </svg>
                            </div>
                            <span class="text-blue-600 font-medium text-sm" id="fileNameDisplay">Drag & drop your PDF or
                                <span class="underline decoration-blue-300 underline-offset-2">browse</span></span>
                        </div>
                    </div>
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-semibold py-4 px-6 rounded-2xl shadow-lg shadow-blue-500/25 transform transition-all hover:-translate-y-0.5 active:translate-y-0 flex justify-center items-center gap-2">
                        <span>Analyze Career Path</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </button>
                </form>

                <!-- Processing State -->
                <div id="uploadProgress" class="mt-8 hidden">
                    <p class="text-sm font-semibold text-gray-600 mb-3 flex items-center justify-center gap-2">
                        <svg class="animate-spin h-4 w-4 text-purple-600" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Synthesizing with Gemini AI...
                    </p>
                    <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                        <div
                            class="h-full bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 rounded-full animate-pulse blur-[1px] w-[150%] progress-bar">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Resume Preview Card -->
            <div class="bg-white/80 backdrop-blur-2xl rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white hidden animation-fade-in"
                id="resumePreview">
                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        </path>
                    </svg>
                    Original Document
                </h2>
                <div class="w-full bg-gray-100/50 rounded-2xl overflow-hidden border border-gray-100">
                    <iframe id="resumeIframe" class="w-full h-[350px] hidden rounded-2xl"></iframe>
                    <div id="noResumeMessage" class="py-12 text-center text-gray-400 text-sm">No document loaded</div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Dynamic Results -->
        <div class="w-full lg:w-8/12 flex flex-col gap-6 hidden animation-slide-up" id="results">

            <!-- Top Row: Skills & AI Tips -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">

                <!-- Verified Skills -->
                <div
                    class="bg-white/80 backdrop-blur-2xl rounded-3xl p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white hover:shadow-lg transition-shadow">
                    <h2 class="text-lg font-bold text-gray-800 mb-5 flex items-center gap-2">
                        <div class="p-2 bg-blue-100 text-blue-600 rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </div>
                        Verified Extracted Skills
                    </h2>
                    <ul id="skillsList" class="flex flex-wrap gap-2">
                        <!-- Skills injected via JS -->
                    </ul>
                </div>

                <!-- Optimization Tips -->
                <div
                    class="bg-gradient-to-br from-indigo-900 to-purple-900 rounded-3xl p-8 shadow-xl text-white transform transition-all hover:-translate-y-1 relative overflow-hidden">
                    <!-- Deco circle -->
                    <div
                        class="absolute -right-10 -top-10 w-40 h-40 bg-purple-500 rounded-full mix-blend-screen opacity-20 blur-2xl">
                    </div>

                    <h2 class="text-lg font-bold mb-5 flex items-center gap-2 relative z-10">
                        <div class="p-2 bg-yellow-400/20 text-yellow-300 rounded-lg backdrop-blur-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z">
                                </path>
                            </svg>
                        </div>
                        AI Optimization Insights
                    </h2>
                    <ul id="optimizationTipsList"
                        class="space-y-4 font-medium text-purple-100/90 text-sm relative z-10">
                        <!-- Tips injected via JS -->
                    </ul>
                </div>
            </div>

            <!-- Job Recommendations Feed -->
            <div
                class="bg-white/80 backdrop-blur-2xl rounded-3xl p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-extrabold text-gray-800 flex items-center gap-3">
                        <div class="p-2 bg-green-100 text-green-600 rounded-xl">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                </path>
                            </svg>
                        </div>
                        Targeted Career Matches
                    </h2>
                </div>
                <div id="jobList" class="grid grid-cols-1 gap-6">
                    <!-- Jobs rendered here as beautiful cards via JS -->
                </div>
            </div>

            <!-- Interactive Knowledge Graph -->
            <div
                class="bg-white/80 backdrop-blur-2xl rounded-3xl p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white w-full">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                    <h2 class="text-2xl font-extrabold text-gray-800 flex items-center gap-3">
                        <div class="p-2 bg-indigo-100 text-indigo-600 rounded-xl">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5">
                                </path>
                            </svg>
                        </div>
                        Adaptive Knowledge Graph
                    </h2>
                    <span
                        class="px-4 py-1.5 bg-indigo-50 border border-indigo-100 text-indigo-700 text-xs font-bold uppercase rounded-full tracking-wider shadow-sm flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                        Neo4j Engine Active
                    </span>
                </div>
                <div id="career-graph"
                    class="w-full h-[550px] bg-gradient-to-br from-gray-50 to-white rounded-2xl shadow-inner border border-gray-100 relative overflow-hidden">
                    <!-- D3 Graph injected here -->
                </div>
            </div>

        </div>
    </div>

    <!-- Small UI script to update file name on select -->
    <script>
        document.getElementById('resume').addEventListener('change', function (e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : 'Drag & drop your PDF or <span class="underline decoration-blue-300 underline-offset-2">browse</span>';
            document.getElementById('fileNameDisplay').innerHTML = fileName;
        });
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script src="{{ url_for('static', filename='graph.js') }}"></script>
</body>

</html>
